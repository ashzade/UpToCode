name: 'UpToCode Inspection'
description: 'Run UpToCode logic enforcement, security audit, and adversarial tests against your project'

inputs:
  project_root:
    description: 'Path to the project to inspect. Defaults to the repository root.'
    required: false
    default: ${{ github.workspace }}

outputs:
  passed:
    description: 'true if all checks passed, false otherwise'
    value: ${{ steps.inspect.outputs.passed }}

runs:
  using: 'composite'
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install UpToCode
      shell: bash
      run: |
        git clone --depth 1 https://github.com/ashzade/UpToCode "$RUNNER_TEMP/uptocode"
        cd "$RUNNER_TEMP/uptocode" && npm ci --silent

    - name: Run inspection
      id: inspect
      shell: bash
      env:
        PROJECT_ROOT: ${{ inputs.project_root }}
      run: |
        cd "$RUNNER_TEMP/uptocode"
        node node_modules/.bin/ts-node --transpile-only ci/inspect.ts
        EXIT=$?
        if [ $EXIT -eq 0 ]; then
          echo "passed=true" >> "$GITHUB_OUTPUT"
        else
          echo "passed=false" >> "$GITHUB_OUTPUT"
        fi
        exit $EXIT

    - name: Post inspection report
      if: always() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const reportPath = `${{ inputs.project_root }}/.uptocode-report.md`;
          if (!fs.existsSync(reportPath)) return;
          const body = fs.readFileSync(reportPath, 'utf8');

          // Find and update an existing UpToCode comment, or create a new one
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c =>
            c.user?.login === 'github-actions[bot]' &&
            c.body?.includes('UpToCode Inspection Report')
          );
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }
