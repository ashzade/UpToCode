name: 'UpToCode Inspection'
description: 'Run UpToCode logic enforcement, security audit, spec drift, and adversarial tests against your project'

inputs:
  project_root:
    description: 'Path to the project to inspect. Defaults to the repository root.'
    required: false
    default: ${{ github.workspace }}

outputs:
  passed:
    description: 'true if all checks passed, false otherwise'
    value: ${{ steps.inspect.outputs.passed }}

runs:
  using: 'composite'
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Fetch base branch (for spec-drift)
      if: github.event_name == 'pull_request'
      shell: bash
      run: git fetch origin ${{ github.base_ref }} --depth 1

    - name: Install UpToCode
      shell: bash
      run: |
        git clone --depth 1 https://github.com/ashzade/UpToCode "$RUNNER_TEMP/uptocode"
        cd "$RUNNER_TEMP/uptocode" && npm ci

    - name: Run inspection
      id: inspect
      shell: bash
      env:
        PROJECT_ROOT: ${{ inputs.project_root }}
        GITHUB_BASE_REF: ${{ github.base_ref }}
      run: |
        cd "$RUNNER_TEMP/uptocode"
        echo "--- ts-node path ---"
        ls node_modules/.bin/ts-node || echo "ts-node not found in node_modules/.bin"
        echo "--- node version ---"
        node --version
        echo "--- running inspect ---"
        set +e
        node node_modules/.bin/ts-node --transpile-only ci/inspect.ts
        EXIT=$?
        set -e
        echo "--- inspect exit: $EXIT ---"
        if [ $EXIT -eq 0 ]; then
          echo "passed=true" >> "$GITHUB_OUTPUT"
        else
          echo "passed=false" >> "$GITHUB_OUTPUT"
        fi
        exit $EXIT

    - name: Write to Actions summary
      if: always()
      shell: bash
      run: |
        REPORT="${{ inputs.project_root }}/.uptocode-report.md"
        if [ -f "$REPORT" ]; then
          cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Post inspection PR comment
      if: always() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const reportPath = `${{ inputs.project_root }}/.uptocode-report.md`;
          if (!fs.existsSync(reportPath)) return;
          const body = fs.readFileSync(reportPath, 'utf8');

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c =>
            c.user?.login === 'github-actions[bot]' &&
            c.body?.includes('UpToCode Inspection Report')
          );
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Post spec-drift checklist PR comment
      if: always() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const driftPath = `${{ inputs.project_root }}/.uptocode-drift.md`;
          if (!fs.existsSync(driftPath)) return;
          const body = fs.readFileSync(driftPath, 'utf8');

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          // Living checklist — always edit the same comment, never create duplicates
          const existing = comments.find(c =>
            c.user?.login === 'github-actions[bot]' &&
            c.body?.includes('Guardian: Spec Drift')
          );
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }
