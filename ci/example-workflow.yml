# Copy this file to .github/workflows/uptocode.yml in your project.
#
# Runs the UpToCode Building Inspection on every push and pull request.
# Results appear in the GitHub Actions summary tab (always) and as a
# PR comment (when a pull request is open).

name: UpToCode Inspection

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  inspect:
    name: Building Inspection
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write  # post PR comments
      statuses: write       # post commit status

    steps:
      - uses: actions/checkout@v4

      - uses: ashzade/UpToCode/.github/actions/inspect@main
        with:
          project_root: ${{ github.workspace }}
